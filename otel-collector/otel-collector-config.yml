receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1024
    send_batch_max_size: 2048
    timeout: 5s

  memory_limiter:
    check_interval: 1s
    limit_mib: 100
    spike_limit_mib: 30

exporters:
  # Traces -> Tempo via OTLP gRPC
  otlp/tempo:
    endpoint: infra-tempo:4317
    tls:
      insecure: true

  # Metrics -> Prometheus scrape endpoint
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otel
    resource_to_telemetry_conversion:
      enabled: true

  # Logs (OTLP SDK) -> Loki via OTLP HTTP
  otlphttp/loki:
    endpoint: http://infra-loki:3100/otlp

  # Debug output (stdout)
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki, debug]
