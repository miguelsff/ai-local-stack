global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: mlflow
    static_configs:
      - targets: [infra-mlflow:5000]

  - job_name: litellm
    static_configs:
      - targets: [infra-litellm:4000]
    metrics_path: /metrics

  - job_name: minio
    static_configs:
      - targets: [infra-minio:9000]
    metrics_path: /minio/v2/metrics/cluster

  - job_name: otel-collector
    static_configs:
      - targets: [infra-otel-collector:8889]

  # Optional: Redis metrics require a redis_exporter sidecar.
  # Uncomment and add redis_exporter service to docker-compose.yml if needed.
  # - job_name: redis
  #   static_configs:
  #     - targets: [infra-redis-exporter:9121]
